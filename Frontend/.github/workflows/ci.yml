name: RoadSoS Frontend CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: roadsos-frontend/package.json
      - run: npm ci
        working-directory: roadsos-frontend
      - run: npm run lint
        working-directory: roadsos-frontend
      - run: npm test
        working-directory: roadsos-frontend
      - run: npm run build
        working-directory: roadsos-frontend
