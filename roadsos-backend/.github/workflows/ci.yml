name: RoadSoS Backend CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports: ['27017:27017']
      redis:
        image: redis:7
        ports: ['6379:6379']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: roadsos-backend/package.json
      - run: npm ci
        working-directory: roadsos-backend
      - run: npm run lint
        working-directory: roadsos-backend
      - run: npm test
        working-directory: roadsos-backend
